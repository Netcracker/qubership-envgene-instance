# Important!
# Please use your own runner and docker-images

name: "EnvGene Execution"

run-name: "EnvGene Execution - ${{ github.event.inputs.ENV_NAMES || github.event.inputs.GITHUB_PIPELINE_API_INPUT || 'Manual' }}"

permissions:
  actions: read
  contents: write
  pull-requests: write

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      ENV_NAMES:
        required: true
        type: string
        description: ""
      DEPLOYMENT_TICKET_ID:
        required: false
        default: ""
        type: string
      ENV_TEMPLATE_VERSION:
        required: false
        default: ""
        type: string
      ENV_BUILDER:
        required: false
        default: ""
        type: string
      GET_PASSPORT:
        required: false
        default: ""
        type: string
      CMDB_IMPORT:
        required: false
        default: ""
        type: string
      GITHUB_PIPELINE_API_INPUT:
        required: false
        type: string
        description: "API input string containing all variables in JSON/YAML/key=value format - for API mode"
        default: ""

env:
  CI_COMMIT_REF_NAME: ${{ github.ref_name }}
  CI_PROJECT_DIR: ${{ github.workspace }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  GITHUB_USER_EMAIL: 'fake@fake.com'
  GITHUB_USER_NAME: 'envgene'
  GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
  ENVGENE_AGE_PUBLIC_KEY: ${{ secrets.ENVGENE_AGE_PUBLIC_KEY }}
  ENVGENE_AGE_PRIVATE_KEY: ${{ secrets.ENVGENE_AGE_PRIVATE_KEY }}

  # Docker Images
  DOCKER_IMAGE_PIPEGENE: 'ghcr.io/netcracker/qubership-pipegene:feature_enchance_creds_ansible_20250902-132735'
  DOCKER_IMAGE_ENVGENE: 'ghcr.io/netcracker/qubership-envgene:feature_enchance_creds_ansible_20250902-134333'
  DOCKER_IMAGE_EFFECTIVE_SET_GENERATOR: 'ghcr.io/netcracker/qubership-effective-set-generator:feature_enchance_creds_ansible_20250902-132827'

jobs:
  show_environment_variables:
    name: "Input Parameters Processing"
    runs-on: ubuntu-22.04
    container:
      image: ${{ vars.DOCKER_IMAGE_PIPEGENE || 'ghcr.io/netcracker/qubership-pipegene:feature_enchance_creds_ansible_20250902-132735' }}
      options: --user root
    outputs:
      env_matrix: ${{ steps.matrix-generator.outputs.env_matrix }}
      variables_json: ${{ steps.collect-vars.outputs.variables_json }}
      # Legacy outputs for backward compatibility
      ENV_TEMPLATE_TEST: ${{ env.ENV_TEMPLATE_TEST }}
      ENV_SPECIFIC_PARAMETERS: ${{ env.ENV_SPECIFIC_PARAMETERS }}
      ENV_TEMPLATE_NAME: ${{ env.ENV_TEMPLATE_NAME }}
      CRED_ROTATION_PAYLOAD: ${{ env.CRED_ROTATION_PAYLOAD }}
      ENV_BUILDER: ${{ env.ENV_BUILDER }}
      GENERATE_EFFECTIVE_SET: ${{ env.GENERATE_EFFECTIVE_SET }}
      ENV_INVENTORY_INIT: ${{ env.ENV_INVENTORY_INIT }}
      DOCKER_IMAGE_PIPEGENE: ${{ env.DOCKER_IMAGE_PIPEGENE }}
      DOCKER_IMAGE_ENVGENE: ${{ env.DOCKER_IMAGE_ENVGENE }}
      DOCKER_IMAGE_EFFECTIVE_SET_GENERATOR: ${{ env.DOCKER_IMAGE_EFFECTIVE_SET_GENERATOR }}

    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Set Docker Images
        run: |
          echo "DOCKER_IMAGE_PIPEGENE=${{ env.DOCKER_IMAGE_PIPEGENE }}" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_ENVGENE=${{ env.DOCKER_IMAGE_ENVGENE }}" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_EFFECTIVE_SET_GENERATOR=${{ env.DOCKER_IMAGE_EFFECTIVE_SET_GENERATOR }}" >> $GITHUB_ENV

      - name: Process Input Parameters
        run: |
           echo "DEPLOYMENT_TICKET_ID=${{ github.event.inputs.DEPLOYMENT_TICKET_ID }}" >> $GITHUB_ENV
           echo "ENV_NAMES=${{ github.event.inputs.ENV_NAMES }}" >> $GITHUB_ENV
           echo "ENV_BUILDER=${{ github.event.inputs.ENV_BUILDER }}" >> $GITHUB_ENV
           echo "GET_PASSPORT=${{ github.event.inputs.GET_PASSPORT }}" >> $GITHUB_ENV
           echo "CMDB_IMPORT=${{ github.event.inputs.CMDB_IMPORT }}" >> $GITHUB_ENV
           echo "ENV_TEMPLATE_VERSION=${{ github.event.inputs.ENV_TEMPLATE_VERSION }}" >> $GITHUB_ENV

           # Check if API input is provided
           if [ -n "${{ github.event.inputs.GITHUB_PIPELINE_API_INPUT }}" ]; then
             echo "API Mode: Processing GITHUB_PIPELINE_API_INPUT"

             export GITHUB_PIPELINE_API_INPUT="${{ github.event.inputs.GITHUB_PIPELINE_API_INPUT }}"
             echo "GITHUB_PIPELINE_API_INPUT=${{ github.event.inputs.GITHUB_PIPELINE_API_INPUT }}" >> $GITHUB_ENV

             # Process API input variables
             python .github/scripts/process_api_input.py
           else
             echo "UI Mode: Processing manual inputs"
           fi

           python .github/scripts/load_pipeline_vars.py
           


      - name: Create ENV_GENERATION_PARAMS
        run: |
          python .github/scripts/create_env_generation_params.py

      - name: Collect All Variables
        id: collect-vars
        run: |
          python .github/scripts/collect_all_vars.py

      - name: Input Parameters
        run: |
          # Determine execution mode
          if [ -n "${{ github.event.inputs.GITHUB_PIPELINE_API_INPUT }}" ]; then
            echo "🚀 === Pipeline Execution Information (API Mode) ==="
            echo "Event Type: ${{ github.event_name }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Trigger: API workflow dispatch"
            echo "Parameters source: GITHUB_PIPELINE_API_INPUT + pipeline_vars.yaml fallbacks"
          else
            echo "🚀 === Pipeline Execution Information (UI Mode) ==="
            echo "Event Type: ${{ github.event_name }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Trigger: Manual workflow dispatch (UI)"
            echo "Parameters source: Manual inputs + pipeline_vars.yaml"
          fi
          echo ""
          
          # Debug: Check GITHUB_ENV file
          echo "🔍 Debug: GITHUB_ENV file info:"
          echo "GITHUB_ENV path: $GITHUB_ENV"
          if [ -f "$GITHUB_ENV" ]; then
            echo "File exists, size: $(wc -c < "$GITHUB_ENV") bytes"
            echo "Line count: $(wc -l < "$GITHUB_ENV")"
            echo "Last 5 lines:"
            tail -5 "$GITHUB_ENV"
          else
            echo "❌ GITHUB_ENV file does not exist!"
          fi
          echo ""
          
          # Use dynamic variable display script
          python .github/scripts/display_pipeline_vars.py

      - name: Prepare Parameters
        id: matrix-generator
        shell: bash
        run: |
           echo "🔧 Generating environment matrix from ENV_NAMES..."
           echo "ENV_NAMES value: '$ENV_NAMES'"
           echo "🔍 ENV_NAMES length: ${#ENV_NAMES}"
           echo "🔍 ENV_NAMES contains comma: $(echo "$ENV_NAMES" | grep -c ',' || echo '0')"
           if [ -z "$ENV_NAMES" ]; then
             echo "❌ ERROR: ENV_NAMES is empty or not set!"
             echo "This likely means the input processing failed."
             echo "Creating empty matrix to skip downstream jobs..."
             echo 'env_matrix=[]' >> $GITHUB_OUTPUT
             exit 0
           fi

           # Validate ENV_NAMES is not just whitespace
           if [ -z "$(echo "$ENV_NAMES" | tr -d '[:space:]')" ]; then
             echo "❌ ERROR: ENV_NAMES contains only whitespace!"
             echo "Creating empty matrix to skip downstream jobs..."
             echo 'env_matrix=[]' >> $GITHUB_OUTPUT
             exit 0
           fi

           arr="["
           first=1
           count=0
           for name in $(echo "$ENV_NAMES" | tr ',' ' '); do
             # Skip empty names
             if [ -n "$(echo "$name" | tr -d '[:space:]')" ]; then
               echo "Processing environment: '$name'"
               if [ "$first" = 1 ]; then
                 first=0
               else
                 arr="$arr,"
               fi
               arr="$arr\"$name\""
               count=$((count + 1))
             fi
           done
           arr="$arr]"

           if [ "$count" -eq 0 ]; then
             echo "❌ ERROR: No valid environments found in ENV_NAMES!"
             echo "Creating empty matrix to skip downstream jobs..."
             echo 'env_matrix=[]' >> $GITHUB_OUTPUT
             exit 0
           fi

           echo "Generated matrix with $count environment(s): $arr"
           echo "env_matrix=$arr" >> $GITHUB_OUTPUT

  generate_inventory:
    name: "${{ matrix.environment }} - Generate Inventory"
    runs-on: ubuntu-22.04
    if: always() && needs.show_environment_variables.outputs.ENV_TEMPLATE_TEST != 'true' && (needs.show_environment_variables.outputs.ENV_SPECIFIC_PARAMETERS != '{}' && needs.show_environment_variables.outputs.ENV_SPECIFIC_PARAMETERS != '' || needs.show_environment_variables.outputs.ENV_TEMPLATE_NAME != '')
    needs:
      - show_environment_variables
    container:
      image: ${{ needs.show_environment_variables.outputs.DOCKER_IMAGE_ENVGENE }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.show_environment_variables.outputs.env_matrix) }}
    env:
      FULL_ENV: ${{ matrix.environment }}
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Export Environment Variables
        run: |
          echo "🔧 Exporting environment variables from JSON..."
          
          # Direct export from variables_json
          VARIABLES_JSON='${{ needs.show_environment_variables.outputs.variables_json }}'
          
          if [ -n "$VARIABLES_JSON" ] && [ "$VARIABLES_JSON" != "{}" ]; then
            echo "$VARIABLES_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key value; do
              if [ -n "$key" ] && [ -n "$value" ] && [ "$value" != "null" ]; then
                echo "Setting $key=$value"
                echo "$key=$value" >> $GITHUB_ENV
              fi
            done
          fi
          
          echo "✅ Environment variables exported"

      - name: Prepare variables to work with artifacts
        run: |
          echo "SANITIZED_NAME=$(echo "${{ matrix.environment }}" | sed 's|/|_|g')" >> $GITHUB_ENV
          echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Generate inventory
        run: |
          CLUSTER_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f1)
          export CLUSTER_NAME

          ENVIRONMENT_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f2 | xargs)
          export ENVIRONMENT_NAME

          ENV_NAME="$ENVIRONMENT_NAME"
          export ENV_NAME

          # ENV_GENERATION_PARAMS is already available from inherited environment
          export ENV_GENERATION_PARAMS

          python3 /build_env/scripts/build_env/env_inventory_generation.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generate_inventory_${{ env.SANITIZED_NAME }}
          path: ${{ github.workspace }}/environments/${{ env.FULL_ENV }}

  credential_rotation:
    name: "${{ matrix.environment }} - Credential Rotation"
    runs-on: ubuntu-22.04
    if: always() && needs.show_environment_variables.outputs.CRED_ROTATION_PAYLOAD != ''
    needs:
      - show_environment_variables
      - generate_inventory
    container:
      image: ${{ needs.show_environment_variables.outputs.DOCKER_IMAGE_ENVGENE }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.show_environment_variables.outputs.env_matrix) }}
    env:
      FULL_ENV: ${{ matrix.environment }}
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Prepare variables to download the artifacts
        run: |
          echo "SANITIZED_NAME=$(echo "${{ matrix.environment }}" | sed 's|/|_|g')" >> $GITHUB_ENV
          echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Create the naming for artifact
        run: |
          if [ "$ENV_TEMPLATE_TEST" != "true" ] && ([ "$ENV_SPECIFIC_PARAMETERS" != "{}" ] && [ "$ENV_SPECIFIC_PARAMETERS" != "" ] || [ "$ENV_TEMPLATE_NAME" != "" ]); then
            echo "artifact_name=generate_inventory_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi

      - name: Download artifact
        if: env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '{}' && env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ./downloaded_artifact

      - name: Extract artifact to environment directory
        if: env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '{}' && env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')
        run: |
          mkdir -p "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          cp -rf ./downloaded_artifact/* "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          rm -rf ./downloaded_artifact

      - name: Credential Rotation
        run: |
          export CLUSTER_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f1)
          export ENV_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f2 | xargs)

          # Variables are already available from inherited environment
          export CRED_ROTATION_FORCE
          export CRED_ROTATION_PAYLOAD

          export ENVGENE_AGE_PRIVATE_KEY
          export ENVGENE_AGE_PUBLIC_KEY
          export PUBLIC_AGE_KEYS

          python3 /module/creds_rotation_scripts/creds_rotation_handler.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: credential_rotation_${{ env.SANITIZED_NAME }}
          path: |
            ${{ github.workspace }}/environments/${{ env.FULL_ENV }}
            ${{ github.workspace }}/affected-sensitive-parameters.yaml

  env_build:
    name: "${{ matrix.environment }} - Env Build"
    if: always() && needs.show_environment_variables.outputs.ENV_BUILDER == 'true'
    runs-on: ubuntu-22.04
    needs:
      - show_environment_variables
      - generate_inventory
      - credential_rotation
    container:
      image: ${{ needs.show_environment_variables.outputs.DOCKER_IMAGE_ENVGENE }}
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.show_environment_variables.outputs.env_matrix) }}
    env:
      FULL_ENV: ${{ matrix.environment }}
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Prepare variables to download the artifacts
        run: |
          echo "SANITIZED_NAME=$(echo "${{ matrix.environment }}" | sed 's|/|_|g')" >> $GITHUB_ENV
          echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Create the naming for artifact
        run: |
          if [ "$ENV_TEMPLATE_TEST" = "false" ] && ([ "$ENV_SPECIFIC_PARAMETERS" != "" ] || [ "$ENV_TEMPLATE_NAME" != "" ]); then
            echo "artifact_name=generate_inventory_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi
          if [ "$CRED_ROTATION_PAYLOAD" != "" ]; then
            echo "artifact_name=credential_rotation_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi

      - name: Download artifact
        if: (env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')) || env.CRED_ROTATION_PAYLOAD != '{}'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ./downloaded_artifact

      - name: Extract artifact to environment directory
        if: (env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')) || env.CRED_ROTATION_PAYLOAD != ''
        run: |
          mkdir -p "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          cp -rf ./downloaded_artifact/* "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          rm -rf ./downloaded_artifact

      - name: Build Env
        run: |
          echo "🔧 Exporting all environment variables for build process..."
          
          # Export variables from JSON (directly in this step for immediate availability)
          VARIABLES_JSON='${{ needs.show_environment_variables.outputs.variables_json }}'
          
          if [ -n "$VARIABLES_JSON" ] && [ "$VARIABLES_JSON" != "{}" ]; then
            echo "Loading variables from JSON..."
            # Use eval to export variables directly
            while IFS= read -r export_cmd; do
              echo "Executing: $export_cmd"
              eval "$export_cmd"
            done < <(echo "$VARIABLES_JSON" | jq -r 'to_entries[] | "export \(.key)=\"\(.value)\""')
          fi
          
          # Export job-specific variables
          ENV_NAMES="${{ matrix.environment }}"
          export ENV_NAMES

          ENV_NAME_SHORT=$(echo "$ENV_NAME" | awk -F "/" '{print $NF}')
          export ENV_NAME_SHORT

          CLUSTER_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f1)
          export CLUSTER_NAME

          ENVIRONMENT_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f2 | xargs)
          export ENVIRONMENT_NAME

          ENV_NAME="$ENVIRONMENT_NAME"
          export ENV_NAME

          export CI_PROJECT_DIR

          INSTANCES_DIR="${CI_PROJECT_DIR}/environments"
          export INSTANCES_DIR

          module_ansible_dir="/module/ansible"
          export module_ansible_dir

          module_inventory="${CI_PROJECT_DIR}/configuration/inventory.yaml"
          export module_inventory

          module_ansible_cfg="/module/ansible/ansible.cfg"
          export module_ansible_cfg

          module_config_default="/module/templates/defaults.yaml"
          export module_config_default

          envgen_args=" -vvv"
          export envgen_args

          envgen_debug="true"
          export envgen_debug

          GIT_STRATEGY="none"
          export GIT_STRATEGY

          COMMIT_ENV="true"
          export COMMIT_ENV

          export SECRET_KEY
          export GITHUB_ACTIONS
          export GITHUB_REPOSITORY
          export GITHUB_REF_NAME
          export GITHUB_USER_EMAIL
          export GITHUB_USER_NAME
          export GITHUB_TOKEN
          
          echo "ENV_TEMPLATE_VERSION value: $ENV_TEMPLATE_VERSION"

          if [ -d "${CI_PROJECT_DIR}/configuration/certs" ]; then
          env_path=$(ls -A "${CI_PROJECT_DIR}/configuration/certs");
          for path in $env_path; do bash /module/scripts/update_ca_cert.sh ${CI_PROJECT_DIR}/configuration/certs/$path; done; fi

          if [ "$ENV_TEMPLATE_VERSION" != "" ] && [ "$ENV_TEMPLATE_TEST" == "false" ]; then
            /module/scripts/prepare.sh "set_template_version.yaml"
            /module/scripts/prepare.sh "build_env.yaml"
          else
            /module/scripts/prepare.sh "build_env.yaml"
          fi

          if [ "$ENV_TEMPLATE_TEST" == "true" ]; then
            env_name=$(cat set_variable.txt)
            sed -i "s|\\\"envgeneNullValue\\\"|\\\"test_value\\\"|g" "${CI_PROJECT_DIR}/environments/$env_name/Credentials/credentials.yml"
          else
            env_name=$(echo "$ENV_NAME" | awk -F "/" '{print $NF}')
            export env_name
          fi

          env_path=$(find "${CI_PROJECT_DIR}/environments" -type d -name "$env_name")
          for path in $env_path; do
            if [ -d "$path/Credentials" ]; then
              chmod ugo+rw "$path/Credentials/"*
            fi
          done


      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: env_build_${{ env.SANITIZED_NAME }}
          path: ${{ github.workspace }}/environments/${{ env.FULL_ENV }}

  generate_effective_set:
    name: "${{ matrix.environment }} - Generate Effective Set"
    if: always() && needs.show_environment_variables.outputs.GENERATE_EFFECTIVE_SET == 'true'
    runs-on: ubuntu-22.04
    needs: [show_environment_variables, generate_inventory, credential_rotation, env_build]
    container:
      image: ${{ needs.show_environment_variables.outputs.DOCKER_IMAGE_EFFECTIVE_SET_GENERATOR }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.show_environment_variables.outputs.env_matrix) }}
    env:
      FULL_ENV: ${{ matrix.environment }}
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Export Environment Variables
        run: |
          echo "🔧 Exporting environment variables from JSON..."
          
          # Direct export from variables_json
          VARIABLES_JSON='${{ needs.show_environment_variables.outputs.variables_json }}'
          
          if [ -n "$VARIABLES_JSON" ] && [ "$VARIABLES_JSON" != "{}" ]; then
            echo "$VARIABLES_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key value; do
              if [ -n "$key" ] && [ -n "$value" ] && [ "$value" != "null" ]; then
                echo "Setting $key=$value"
                echo "$key=$value" >> $GITHUB_ENV
              fi
            done
          fi
          
          echo "✅ Environment variables exported"

      - name: Prepare variables to work with artifacts
        run: |
          echo "SANITIZED_NAME=$(echo "${{ matrix.environment }}" | sed 's|/|_|g')" >> $GITHUB_ENV
          echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Create the naming for artifact
        run: |
          if [ "$ENV_TEMPLATE_TEST" = "false" ] && ([ "$ENV_SPECIFIC_PARAMETERS" != "{}" ] && [ "$ENV_SPECIFIC_PARAMETERS" != "" ] || [ "$ENV_TEMPLATE_NAME" != "" ]); then
            echo "artifact_name=generate_inventory_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi
          if [ "$CRED_ROTATION_PAYLOAD" != "{}" ]; then
            echo "artifact_name=credential_rotation_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi
          if [ "$ENV_BUILDER" = "true" ]; then
            echo "artifact_name=env_build_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi

      - name: Download artifact
        if: (env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '{}' && env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')) || env.ENV_BUILDER == 'true' || env.CRED_ROTATION_PAYLOAD != '{}'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ./downloaded_artifact

      - name: Extract artifact to environment directory
        if: (env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '{}' && env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')) || env.ENV_BUILDER == 'true' || env.CRED_ROTATION_PAYLOAD != '{}'
        run: |
          mkdir -p "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          cp -rf ./downloaded_artifact/* "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          rm -rf ./downloaded_artifact

      - name: Generate Effective Set
        run: |
          echo "🔧 Exporting all environment variables for effective set generation..."
          
          # Export variables from JSON (directly in this step for immediate availability)
          VARIABLES_JSON='${{ needs.show_environment_variables.outputs.variables_json }}'
          
          if [ -n "$VARIABLES_JSON" ] && [ "$VARIABLES_JSON" != "{}" ]; then
            echo "Loading variables from JSON..."
            # Use eval to export variables directly
            while IFS= read -r export_cmd; do
              eval "$export_cmd"
            done < <(echo "$VARIABLES_JSON" | jq -r 'to_entries[] | "export \(.key)=\"\(.value)\""')
          fi

          ENV_NAMES="${{ matrix.environment }}"
          export ENV_NAMES

          ENV_NAME_SHORT=$(echo "$ENV_NAME" | awk -F "/" '{print $NF}')
          export ENV_NAME_SHORT

          CLUSTER_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f1)
          export CLUSTER_NAME

          ENVIRONMENT_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f2 | xargs)
          export ENVIRONMENT_NAME

          ENV_NAME="$ENVIRONMENT_NAME"
          export ENV_NAME

          export CI_PROJECT_DIR

          INSTANCES_DIR="${CI_PROJECT_DIR}/environments"
          export INSTANCES_DIR

          module_ansible_dir="/module/ansible"
          export module_ansible_dir

          module_inventory="${CI_PROJECT_DIR}/configuration/inventory.yaml"
          export module_inventory

          module_ansible_cfg="/module/ansible/ansible.cfg"
          export module_ansible_cfg

          module_config_default="/module/templates/defaults.yaml"
          export module_config_default

          envgen_args=" -vvv"
          export envgen_args

          envgen_debug="true"
          export envgen_debug

          GIT_STRATEGY="none"
          export GIT_STRATEGY

          COMMIT_ENV="true"
          export COMMIT_ENV

          export SECRET_KEY
          export GITHUB_ACTIONS
          export GITHUB_REPOSITORY
          export GITHUB_REF_NAME
          export GITHUB_USER_EMAIL
          export GITHUB_USER_NAME
          export GITHUB_TOKEN
          
          echo "ENV_TEMPLATE_VERSION value: $ENV_TEMPLATE_VERSION"

          /module/scripts/prepare.sh "generate_effective_set.yaml"

          env_path=$(find "${CI_PROJECT_DIR}/environments" -type d -name "$env_name")
          for path in $env_path; do
            if [ -d "$path/Credentials" ]; then
              chmod ugo+rw "$path/Credentials/"*
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generate_effective_set_${{ env.SANITIZED_NAME }}
          path: ${{ github.workspace }}/environments/${{ env.FULL_ENV }}

  git_commit:
    name: "${{ matrix.environment }} - Git Commit"
    runs-on: ubuntu-22.04
    needs: [show_environment_variables, generate_inventory, credential_rotation, env_build, generate_effective_set]
    if: always() && (needs.show_environment_variables.outputs.ENV_INVENTORY_INIT == 'true' || needs.show_environment_variables.outputs.ENV_BUILDER == 'true' || needs.show_environment_variables.outputs.GENERATE_EFFECTIVE_SET == 'true' || needs.show_environment_variables.outputs.CRED_ROTATION_PAYLOAD != '')
    container:
      image: ${{ needs.show_environment_variables.outputs.DOCKER_IMAGE_ENVGENE }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.show_environment_variables.outputs.env_matrix) }}
    env:
      FULL_ENV: ${{ matrix.environment }}
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Export Environment Variables
        run: |
          echo "🔧 Exporting environment variables from JSON..."
          
          # Direct export from variables_json
          VARIABLES_JSON='${{ needs.show_environment_variables.outputs.variables_json }}'
          
          if [ -n "$VARIABLES_JSON" ] && [ "$VARIABLES_JSON" != "{}" ]; then
            echo "$VARIABLES_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key value; do
              if [ -n "$key" ] && [ -n "$value" ] && [ "$value" != "null" ]; then
                echo "Setting $key=$value"
                echo "$key=$value" >> $GITHUB_ENV
              fi
            done
          fi
          
          echo "✅ Environment variables exported"

      - name: Prepare variables to work with artifacts
        run: |
          echo "SANITIZED_NAME=$(echo "${{ matrix.environment }}" | sed 's|/|_|g')" >> $GITHUB_ENV
          echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Create the naming for artifact
        run: |
          if [ "$ENV_TEMPLATE_TEST" = "false" ] && ([ "$ENV_SPECIFIC_PARAMETERS" != "" ] || [ "$ENV_TEMPLATE_NAME" != "" ]); then
            echo "artifact_name=generate_inventory_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi
          if [ "$CRED_ROTATION_PAYLOAD" != "" ]; then
            echo "artifact_name=credential_rotation_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi
          if [ "$ENV_BUILDER" = "true" ]; then
            echo "artifact_name=env_build_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi
          if [ "$GENERATE_EFFECTIVE_SET" = "true" ]; then
            echo "artifact_name=generate_effective_set_${{ env.SANITIZED_NAME }}" >> $GITHUB_ENV
          fi

      - name: Download artifact
        if: (env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')) || env.ENV_BUILDER == 'true' || env.GENERATE_EFFECTIVE_SET == 'true' || env.CRED_ROTATION_PAYLOAD != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ./downloaded_artifact

      - name: Extract artifact to environment directory
        if: (env.ENV_TEMPLATE_TEST != 'true' && (env.ENV_SPECIFIC_PARAMETERS != '' || env.ENV_TEMPLATE_NAME != '')) || env.ENV_BUILDER == 'true' || env.GENERATE_EFFECTIVE_SET == 'true' || env.CRED_ROTATION_PAYLOAD != ''
        run: |
          mkdir -p "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          cp -rf ./downloaded_artifact/* "${{ env.PROJECT_DIR }}/environments/${{ env.FULL_ENV }}/"
          rm -rf ./downloaded_artifact

      - name: Git Commit
        run: |
          # Environment variables are already exported by composite action!
          # Only export job-specific variables
          
          ENV_NAME_SHORT=$(echo "$ENV_NAME" | awk -F "/" '{print $NF}')
          export ENV_NAME_SHORT

          CLUSTER_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f1)
          export CLUSTER_NAME

          ENVIRONMENT_NAME=$(echo "${{ matrix.environment }}" | cut -d'/' -f2 | xargs)
          export ENVIRONMENT_NAME

          ENV_NAME="$ENVIRONMENT_NAME"
          export ENV_NAME

          export CI_PROJECT_DIR

          INSTANCES_DIR="${CI_PROJECT_DIR}/environments"
          export INSTANCES_DIR

          module_ansible_dir="/module/ansible"
          export module_ansible_dir

          module_inventory="${CI_PROJECT_DIR}/configuration/inventory.yaml"
          export module_inventory

          module_ansible_cfg="/module/ansible/ansible.cfg"
          export module_ansible_cfg

          module_config_default="/module/templates/defaults.yaml"
          export module_config_default

          envgen_args=" -vvv"
          export envgen_args

          envgen_debug="true"
          export envgen_debug

          GIT_STRATEGY="none"
          export GIT_STRATEGY

          COMMIT_ENV="true"
          export COMMIT_ENV

          export SECRET_KEY
          export GITHUB_ACTIONS
          export GITHUB_REPOSITORY
          export GITHUB_REF_NAME
          export GITHUB_USER_EMAIL
          export GITHUB_USER_NAME
          export GITHUB_TOKEN

          echo "Prepare git_commit job for ${ENVIRONMENT_NAME}..."

          if [ -d "${CI_PROJECT_DIR}/configuration/certs" ]; then
            env_path=$(ls -A "${CI_PROJECT_DIR}/configuration/certs")
            for path in $env_path; do
              bash /module/scripts/update_ca_cert.sh "${CI_PROJECT_DIR}/configuration/certs/$path"
            done
          fi

          git config --global --add safe.directory "${CI_PROJECT_DIR}"

          /module/scripts/prepare.sh "git_commit.yaml"

          env_path=$(find "${CI_PROJECT_DIR}/environments" -type d -name "$env_name")
          for path in $env_path; do
            if [ -d "$path/Credentials" ]; then
              chmod ugo+rw "$path/Credentials/"*
            fi
          done

          cp -rf ${CI_PROJECT_DIR}/environments ${CI_PROJECT_DIR}/git_envs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: git_commit_${{ env.SANITIZED_NAME }}
          path: ${{ github.workspace }}/git_envs
