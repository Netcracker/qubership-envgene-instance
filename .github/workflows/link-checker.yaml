---
name: "[NO USE] Link Checker"

on:
  workflow_dispatch:

permissions:
  contents: read
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --base . --verbose --no-progress './**/*.md' --accept 100..=103,200..=299,429
          format: markdown
          fail: true
