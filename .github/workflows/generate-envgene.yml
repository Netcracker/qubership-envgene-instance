#Enchanced version to create EnvGene, based on github best practices

name: "Generate Envgene"

run-name: "Generate Envgene - ${{ github.event.inputs.ENV_NAMES }}"

permissions:
  actions: read
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      ENV_NAMES:
        required: false
        type: string
        description: ""
      ENV_TEMPLATE_VERSION:
        required: false
        default: ""
        type: string
        description: ""
      ENV_BUILDER:
        required: false
        default: "true"
        type: string
        description: ""

jobs: