# External credentials context for external-cred-provision CLI.
# Docs: https://github.com/Netcracker/qubership-envgene/blob/main/docs/features/external-creds-provisioning-cli.md
#
# OpenBao auth: GitHub secrets BAO_ADDR + BAO_TOKEN
# Paths: secret/data/shared/<project>/<secret-name>  (KV v2 mount: secret)

credentials:
  db-app-cred:
    vals: "ref+openbao://secret/data/shared/envgene/db-app-cred"
    strategy: create_if_absent
    data:
      username: app_user
      password: _generateValue

  db-readonly-cred:
    vals: "ref+openbao://secret/data/shared/envgene/db-readonly-cred"
    strategy: create_if_absent
    data:
      username: readonly_user
      password: _generateValue

  monitoring-token:
    vals: "ref+openbao://secret/data/shared/envgene/monitoring-token"
    strategy: create_if_absent
    data:
      value: placeholder-change-me
