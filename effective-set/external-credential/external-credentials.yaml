# External credentials context for external-cred-provision CLI.
# Docs: https://github.com/Netcracker/qubership-envgene/blob/main/docs/features/external-creds-provisioning-cli.md
#
# OpenBao auth: GitHub secrets BAO_ADDR + BAO_TOKEN
# vals path = mount + logical path WITHOUT /data/ (library adds /data/ for KV v2)
# API result: /v1/secret/data/shared/envgene/<name>

credentials:
  db-app-cred:
    vals: "ref+openbao://secret/shared/envgene/db-app-cred"
    strategy: create_if_absent
    data:
      username: app_user
      password: _generateValue

  aws-multi-named-create-cred:
    vals: ref+awssecrets://test1-test2-01-02/env-1/aws-multi-named-create-cred?region=India&secret_store_id=maas_store
    strategy: create_if_absent
    data:
      username: _generateValue
      password: _generateValue

  gcp-sing-named-create-cred:
    vals: ref+gcpsecrets://project-57115ebf-4c70-46af-bf2/shared-envgene-gcp-single-cred?secret_store_id=dbaas_store
    strategy: create_if_absent
    data: _generateValue
